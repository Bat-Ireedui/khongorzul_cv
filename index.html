<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Батаа Хонгорзул — Анкета (CV)</title>
<meta name="description" content="Батаа Хонгорзул — банкны мэдээллийн технологийн ахлах мэргэжилтэн. CV.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23F6EFF1'/%3E%3Cg fill='none' stroke='%23B14D66' stroke-width='1.6'%3E%3Crect x='8.5' y='8.5' width='15' height='15' rx='4'/%3E%3Crect x='8.5' y='8.5' width='15' height='15' rx='4' transform='rotate(45 16 16)'/%3E%3C/g%3E%3C/svg%3E">
<style>
  :root{
    --rose:#B14D66; --rose-deep:#8A3848; --ink:#3B2E33; --muted:#7A6A70;
    --paper:#FBF7F6; --line:#EBD9DE;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; display:flex; flex-direction:column; min-height:100%;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:var(--paper);
  }
  header{
    flex:0 0 auto; display:flex; align-items:center; gap:12px;
    padding:12px clamp(14px,3vw,28px);
    background:#fff; border-bottom:1px solid var(--line);
  }
  .who{min-width:0}
  .who b{display:block; font-size:15px; font-weight:600; color:var(--rose-deep);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .who span{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted)}
  .spacer{flex:1}
  .btn{
    flex:0 0 auto; display:inline-flex; align-items:center; gap:8px;
    font-size:13px; font-weight:600; text-decoration:none;
    color:#fff; background:var(--rose); border:1px solid var(--rose);
    padding:9px 16px; border-radius:999px; white-space:nowrap;
    transition:background .15s,color .15s,border-color .15s;
  }
  .btn:hover{background:var(--rose-deep); border-color:var(--rose-deep)}
  .btn.ghost{color:var(--rose); background:transparent}
  .btn.ghost:hover{color:#fff; background:var(--rose)}
  .btn svg{width:15px;height:15px;fill:currentColor}
  main{flex:1 1 auto; position:relative; min-height:0}
  iframe{width:100%; height:100%; border:0; display:block; background:var(--paper)}
  /* mobile fallback (browsers that won't embed PDFs inline) */
  .fallback{display:none; padding:0 22px}
  .fallback .card{
    max-width:420px; margin:9vh auto 0; background:#fff;
    border:1px solid var(--line); border-radius:18px; padding:30px 24px; text-align:center;
    box-shadow:0 12px 40px rgba(177,77,102,.12);
  }
  .fallback h1{font-size:21px; margin:0 0 4px; color:var(--rose-deep)}
  .fallback p{color:var(--muted); font-size:14.5px; line-height:1.6; margin:0 0 22px}
  .fallback .btn{display:flex; justify-content:center; margin:10px 0 0}
  @media (max-width:820px){
    iframe{display:none}
    .fallback{display:block}
    header .ghost{display:none}
  }
</style>
</head>
<body>
  <header>
    <div class="who">
      <b>Батаа Хонгорзул</b>
      <span>Ахлах мэргэжилтэн · Банкны IT</span>
    </div>
    <div class="spacer"></div>
    <a class="btn ghost" href="Khongorzul-Bataa-CV.pdf" target="_blank" rel="noopener">Шинэ цонхонд нээх</a>
    <a class="btn" href="Khongorzul-Bataa-CV.pdf" download>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3a1 1 0 1 1 1.4 1.42l-5 5a1 1 0 0 1-1.4 0l-5-5a1 1 0 0 1 1.4-1.42l3.3 3.3V4a1 1 0 0 1 1-1zM5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1z"/></svg>
      Татах
    </a>
  </header>

  <main>
    <iframe src="Khongorzul-Bataa-CV.pdf#view=FitH" title="Батаа Хонгорзул — CV"></iframe>
    <div class="fallback">
      <div class="card">
        <h1>Батаа Хонгорзул</h1>
        <p>Ахлах мэргэжилтэн — Банкны мэдээллийн технологи. Анкетыг доорх товчоор нээж үзнэ үү.</p>
        <a class="btn" href="Khongorzul-Bataa-CV.pdf" target="_blank" rel="noopener">CV нээх (PDF)</a>
        <a class="btn ghost" href="Khongorzul-Bataa-CV.pdf" download style="margin-top:12px">Татаж авах</a>
      </div>
    </div>
  </main>
</body>
</html>
